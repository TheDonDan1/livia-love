<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVIA ❤️</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Segoe UI',sans-serif;
text-align:center;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px 20px;
opacity:0;
transform:translateY(40px);
transition:1.5s;
}

section.show{
opacity:1;
transform:translateY(0);
}

h1{
color:red;
font-size:2.3em;
margin-bottom:20px;
}

.memory-sequence{
display:flex;
flex-direction:column;
align-items:center;
gap:60px;
width:100%;
}

.memory-sequence img,
.memory-sequence video{
width:90%;
max-width:750px;
border-radius:20px;
box-shadow:0 0 30px rgba(255,0,100,0.4);
opacity:0;
transform:translateY(60px);
transition:1.2s ease;
}

.memory-sequence .show-media{
opacity:1;
transform:translateY(0);
}

video{
background:black;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:red;
color:white;
cursor:pointer;
margin:15px;
transition:0.3s;
}

button:hover{
background:white;
color:red;
transform:scale(1.05);
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<section class="show">
<h1>LIVIA ❤️</h1>
<p>Notre Histoire en Images</p>
<button onclick="startExperience()">Entrer dans notre univers ✨</button>
</section>

<section id="memories">
<h1>Nos Souvenirs ❤️</h1>

<div class="memory-sequence">

<img src="IMG-20251227-WA0016.jpg">

<video muted controls playsinline>
<source src="VID-20251231-WA0031.mp4" type="video/mp4">
</video>

<img src="IMG-20260116-WA0108.jpg">

<video muted controls playsinline>
<source src="VID-20260101-WA0010.mp4" type="video/mp4">
</video>

<img src="20251231_135631.jpg">

<video muted controls playsinline>
<source src="VID-20260101-WA0011.mp4" type="video/mp4">
</video>

<img src="IMG-20260116-WA0105.jpg">

<video muted controls playsinline>
<source src="VID-20260101-WA0012.mp4" type="video/mp4">
</video>

<img src="IMG-20260101-WA0037.jpg">

<video muted controls playsinline>
<source src="VID-20260101-WA0013.mp4" type="video/mp4">
</video>

<img src="1768590874870.jpg">

<video muted controls playsinline>
<source src="VID-20260110-WA0206.mp4" type="video/mp4">
</video>

<video muted controls playsinline>
<source src="VID-20260116-WA0140.mp4" type="video/mp4">
</video>

</div>
</section>

<audio id="music" src="tems-me-u.mp3" loop></audio>

<script>

// Lancer musique + afficher sections
function startExperience(){
document.getElementById("music").play();
document.querySelectorAll("section").forEach(sec=>{
sec.classList.add("show");
});
}

// Animation apparition au scroll
const medias = document.querySelectorAll(".memory-sequence img, .memory-sequence video");

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show-media");
}
});
},{threshold:0.4});

medias.forEach(media=>{
observer.observe(media);
});

// Forcer toutes les vidéos en mute
document.querySelectorAll("video").forEach(video=>{
video.muted = true;
});

// Étoiles animées
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let stars=[];
for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:Math.random()*2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();

</script>

</body>
</html>

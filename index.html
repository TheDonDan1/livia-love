<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVIA ❤️</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Segoe UI',sans-serif;
text-align:center;
overflow-x:hidden;
scroll-behavior:smooth;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px 20px;
}

h1{
color:red;
font-size:2.5em;
margin-bottom:20px;
}

.memory{
opacity:0;
transform:translateY(80px);
transition:1.5s ease;
}

.memory.show{
opacity:1;
transform:translateY(0);
}

.memory img,
.memory video{
width:90%;
max-width:750px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,100,0.4);
}

video{
background:black;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:red;
color:white;
cursor:pointer;
margin-top:20px;
font-size:1em;
}

.fade-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
transition:1s;
z-index:5;
}

.fade-overlay.show{
opacity:1;
}

.heart{
position:fixed;
color:red;
font-size:20px;
animation:floatUp 4s linear forwards;
opacity:0.8;
}

@keyframes floatUp{
0%{transform:translateY(0) scale(1);}
100%{transform:translateY(-600px) scale(1.5);opacity:0;}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>
<div class="fade-overlay" id="fade"></div>

<section>
<h1>LIVIA ❤️</h1>
<p>Notre Film</p>
<button onclick="startExperience()">Lancer le Film 🎬</button>
</section>

<section id="film">

<div class="memory"><img src="IMG-20251227-WA0016.jpg"></div>

<div class="memory">
<video muted playsinline>
<source src="VID-20251231-WA0031.mp4" type="video/mp4">
</video>
</div>

<div class="memory"><img src="IMG-20260116-WA0108.jpg"></div>

<div class="memory">
<video muted playsinline>
<source src="VID-20260101-WA0010.mp4" type="video/mp4">
</video>
</div>

<div class="memory"><img src="20251231_135631.jpg"></div>

<div class="memory">
<video muted playsinline>
<source src="VID-20260101-WA0011.mp4" type="video/mp4">
</video>
</div>

<div class="memory"><img src="IMG-20260116-WA0105.jpg"></div>

<div class="memory">
<video muted playsinline>
<source src="VID-20260101-WA0012.mp4" type="video/mp4">
</video>
</div>

<div class="memory"><img src="IMG-20260101-WA0037.jpg"></div>

<div class="memory">
<video muted playsinline>
<source src="VID-20260101-WA0013.mp4" type="video/mp4">
</video>
</div>

<div class="memory"><img src="1768590874870.jpg"></div>

<div class="memory">
<video muted playsinline>
<source src="VID-20260110-WA0206.mp4" type="video/mp4">
</video>
</div>

<div class="memory">
<video muted playsinline>
<source src="VID-20260116-WA0140.mp4" type="video/mp4">
</video>
</div>

</section>

<audio id="music" src="tems-me-u.mp3" loop></audio>

<script>

// MUSIQUE + AUTO SCROLL CINEMA
function startExperience(){
document.getElementById("music").play();
autoScroll();
}

function autoScroll(){
let scrollAmount = 0;
let speed = 0.5;
setInterval(()=>{
scrollAmount += speed;
window.scrollTo(0, scrollAmount);
},20);
}

// Apparition synchronisée
const memories = document.querySelectorAll(".memory");

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");

// Si vidéo → autoplay silencieux
let video = entry.target.querySelector("video");
if(video){
video.play();
}
}
});
},{threshold:0.6});

memories.forEach(m=>{
observer.observe(m);
});

// Fondu noir léger entre sections
window.addEventListener("scroll",()=>{
let fade = document.getElementById("fade");
fade.classList.add("show");
setTimeout(()=>fade.classList.remove("show"),300);
});

// Cœurs flottants
setInterval(()=>{
let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";
heart.style.top="80%";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
},1500);

// Étoiles fond animé
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let stars=[];
for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:Math.random()*2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();

</script>

</body>
</html>

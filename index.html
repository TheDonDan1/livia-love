<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre Histoire ❤️</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
overflow:hidden;
text-align:center;
}

/* INTRO STUDIO */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:3em;
letter-spacing:5px;
z-index:30;
animation:fadeOut 4s forwards 4s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* ÉTOILES */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* TITRES */
h1{
margin-top:20px;
font-size:2em;
position:relative;
z-index:5;
}

#counter{
position:relative;
z-index:5;
}

/* GALERIE */
.gallery{
position:relative;
width:100%;
height:70vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
z-index:5;
}

.gallery img,
.gallery video{
position:absolute;
max-width:80%;
max-height:80%;
border-radius:20px;
opacity:0;
transition:opacity 2s ease-in-out, transform 10s ease-in-out;
box-shadow:0 0 40px rgba(255,255,255,0.3);
transform:scale(1);
}

.active{
opacity:1;
transform:scale(1.05);
}

/* MESSAGE FINAL */
#finalMessage{
position:absolute;
top:40%;
width:100%;
font-size:2em;
opacity:0;
transition:3s;
z-index:10;
}

/* CREDITS */
#credits{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:3s;
font-size:1.2em;
z-index:20;
}
</style>
</head>

<body>

<div id="intro">DEM ETRIUS STUDIOS</div>

<canvas id="stars"></canvas>

<h1>Nos Souvenirs ❤️</h1>
<h2 id="counter"></h2>

<div class="gallery">

<img src="IMG-20251227-WA0016.jpg">
<video src="VID-20251231-WA0031.mp4" muted></video>

<img src="IMG-20260116-WA0108.jpg">
<video src="VID-20260101-WA0010.mp4" muted></video>

<img src="20251231_135631.jpg">
<video src="VID-20260101-WA0011.mp4" muted></video>

<img src="IMG-20260116-WA0105.jpg">
<video src="VID-20260101-WA0012.mp4" muted></video>

<img src="IMG-20260101-WA0037.jpg">
<video src="VID-20260101-WA0013.mp4" muted></video>

<img src="1768590874870.jpg">
<video src="VID-20260110-WA0206.mp4" muted></video>

<video src="VID-20260116-WA0140.mp4" muted></video>

</div>

<div id="finalMessage">
💍 Pour toujours toi et moi ❤️
</div>

<div id="credits">
<h1 style="color:red;">FIN ❤️</h1>
<p>Une histoire écrite par Demetrius</p>
<p>Avec Livia comme plus belle actrice</p>
<p>Depuis le 2 Novembre 2025</p>
</div>

<audio id="music" src="tems-me-u.mp3" autoplay loop></audio>

<script>

/* ÉTOILES */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:Math.random()*2,
speed:Math.random()*0.5
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
ctx.fill();
s.y+=s.speed;
if(s.y>canvas.height){s.y=0;}
});
requestAnimationFrame(drawStars);
}
drawStars();

/* GALERIE AUTO */
const items = document.querySelectorAll(".gallery img, .gallery video");
let index = 0;

function showNext(){
items.forEach(item=>{
item.classList.remove("active");
if(item.tagName==="VIDEO"){
item.pause();
item.currentTime=0;
}
});

let current = items[index];
current.classList.add("active");

if(current.tagName==="VIDEO"){
current.play();
}

index++;

if(index >= items.length){
setTimeout(showFinal,6000);
}else{
setTimeout(showNext,6000);
}
}
setTimeout(showNext,8000);

/* FINAL */
function showFinal(){
document.getElementById("finalMessage").style.opacity="1";
setTimeout(()=>{
document.getElementById("credits").style.bottom="0";
},5000);
}

/* COMPTEUR */
function updateCounter(){
const startDate = new Date("2025-11-02T15:08:00");
const now = new Date();
const diff = now - startDate;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff / (1000*60*60)) % 24);
const minutes = Math.floor((diff / (1000*60)) % 60);

document.getElementById("counter").innerHTML =
"Depuis " + days + " jours, " + hours + " heures et " + minutes + " minutes ❤️";
}
setInterval(updateCounter,60000);
updateCounter();

/* FLASH DROP */
setTimeout(()=>{
let flash=document.createElement("div");
flash.style.position="fixed";
flash.style.top=0;
flash.style.left=0;
flash.style.width="100%";
flash.style.height="100%";
flash.style.background="white";
flash.style.opacity="0.8";
flash.style.zIndex="15";
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),300);
},35000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre Histoire ❤️</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  text-align:center;
}

/* --- INTRO NETFLIX STYLE --- */
#netflixIntro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:8vw;
  letter-spacing:0.2em;
  color:#E50914;
  font-weight:bold;
  opacity:0;
  z-index:100;
  transform: scale(0.5) rotateY(90deg);
  animation:netflixIn 2s forwards, netflixOut 1s forwards 3s;
}
@keyframes netflixIn{
  0% {opacity:0; transform: scale(0.5) rotateY(90deg);}
  50% {opacity:1; transform: scale(1.2) rotateY(0deg); text-shadow:0 0 20px #E50914;}
  70% {transform: scale(0.95); text-shadow:0 0 40px #E50914;}
  100% {opacity:1; transform: scale(1); text-shadow:0 0 60px #E50914;}
}
@keyframes netflixOut{
  to {opacity:0; visibility:hidden;}
}

/* Canvas étoiles */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* Intro */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:6vw;
  letter-spacing:2vw;
  z-index:30;
  animation:fadeOut 4s forwards 4s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* Titres et compteur */
h1{margin-top:20px;font-size:5vw;position:relative;z-index:5;}
#counter{position:relative;z-index:5;font-size:4vw;}

/* Galerie diaporama */
.gallery {
  position: relative;
  width: 100%;
  height: 50vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 5;
}

.gallery img, .gallery video {
  position: absolute;
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 1s, transform 1s;
}

.gallery img.active, .gallery video.active {
  opacity:1;
  transform: scale(1.05);
  z-index:10;
}

/* Contrôles boutons */
#controls{
  position:relative;
  z-index:10;
  margin-top:10px;
}
button{
  padding:15px 25px;
  margin:0 10px;
  font-size:4vw;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#fff;
  color:black;
}

/* Message final */
#finalMessage{
  position:absolute;
  top:35%;
  width:100%;
  font-size:6vw;
  opacity:0;
  transition:1s;
  z-index:10;
}

/* Credits */
#credits{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:3s;
  font-size:4vw;
  z-index:20;
}

/* Bouton musique */
#playMusic{
  position:fixed;
  top:10px;
  right:10px;
  z-index:50;
  padding:10px 20px;
  font-size:4vw;
  cursor:pointer;
}

/* --- Responsive Mobile --- */
@media (max-width:768px){
  #netflixIntro{font-size:12vw;}
  #intro{font-size:10vw; letter-spacing:1vw;}
  h1{font-size:8vw;}
  #counter{font-size:6vw;}
  #finalMessage{font-size:8vw; top:30%;}
  #controls button{font-size:5vw; padding:12px 18px;}
  #credits{font-size:5vw;}
}
</style>
</head>
<body>

<!-- NETFLIX STYLE INTRO -->
<div id="netflixIntro">THE DON</div>

<!-- Intro existant -->
<div id="intro">THE DON PRODUCTION</div>

<!-- Canvas étoiles -->
<canvas id="stars"></canvas>

<!-- Titres -->
<h1>Nos Souvenirs ❤️</h1>
<h2 id="counter"></h2>

<!-- Galerie -->
<div class="gallery">
  <img src="assets/1768590874870.jpg">
  <img src="assets/20251231_135631.jpg">
  <img src="assets/IMG-20251227-WA0014.jpg">
  <img src="assets/IMG-20251227-WA0016.jpg">
  <img src="assets/IMG-20260101-WA0037.jpg">
  <img src="assets/IMG-20260116-WA0105.jpg">
  <img src="assets/IMG-20260116-WA0108.jpg">
  
  <video src="assets/Snapchat-1592542639-2.mp4" muted playsinline></video>
  <video src="assets/Snapchat-442811167.mp4" muted playsinline></video>
  <video src="assets/VID-20251231-WA0031.mp4" muted playsinline></video>
  <video src="assets/VID-20260101-WA0010.mp4" muted playsinline></video>
  <video src="assets/VID-20260101-WA0011.mp4" muted playsinline></video>
  <video src="assets/VID-20260101-WA0012.mp4" muted playsinline></video>
  <video src="assets/VID-20260101-WA0013.mp4" muted playsinline></video>
  <video src="assets/VID-20260110-WA0206.mp4" muted playsinline></video>
  <video src="assets/VID-20260116-WA0140.mp4" muted playsinline></video>
</div>

<!-- Contrôles -->
<div id="controls">
  <button id="prevBtn">⬅ Précédent</button>
  <button id="nextBtn">Suivant ➡</button>
</div>

<!-- Message final -->
<div id="finalMessage">💍 Pour toujours toi et moi ❤️</div>

<!-- Credits -->
<div id="credits">
<h1 style="color:red;">FIN ❤️</h1>
<p>Une histoire écrite par THE DON</p>
<p>Avec Livia comme plus belle actrice</p>
<p>Depuis le 2 Novembre 2025</p>
</div>

<!-- Musique -->
<audio id="music" src="assets/tems-me-u.mp3" loop></audio>
<button id="playMusic">▶ Play Music</button>

<script>
// --- Musique ---
const music = document.getElementById("music");
document.getElementById("playMusic").onclick = () => {
  music.play();
  document.getElementById("playMusic").style.display="none";
};

// --- Étoiles ---
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let stars=[];
for(let i=0;i<200;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,radius:Math.random()*2,speed:Math.random()*0.5});
}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.fill();
    s.y+=s.speed;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// --- Compteur ---
function updateCounter(){
  const startDate=new Date("2025-11-02T15:08:00");
  const now=new Date();
  const diff=now-startDate;
  const days=Math.floor(diff/(1000*60*60*24));
  const hours=Math.floor((diff/(1000*60*60))%24);
  const minutes=Math.floor((diff/(1000*60))%60);
  document.getElementById("counter").innerHTML="Depuis "+days+" jours, "+hours+" heures et "+minutes+" minutes ❤️";
}
setInterval(updateCounter,60000);
updateCounter();

// --- Galerie diaporama ---
const items=document.querySelectorAll(".gallery img, .gallery video");
let index=0;
function showItem(idx){
  items.forEach(item=>{
    item.classList.remove("active");
    if(item.tagName==="VIDEO"){ item.pause(); item.currentTime=0; }
  });
  let current = items[idx];
  current.classList.add("active");
  if(current.tagName==="VIDEO") current.play();
}
showItem(index);

// --- Navigation ---
document.getElementById("nextBtn").onclick = ()=>{
  if(index<items.length-1){ index++; showItem(index); }
  if(index===items.length-1){
    document.getElementById("finalMessage").style.opacity="1";
    setTimeout(()=>{document.getElementById("credits").style.bottom="0";},1500);
  }
};
document.getElementById("prevBtn").onclick = ()=>{
  if(index>0){ index--; showItem(index); }
};

// --- Son Netflix intro ---
const netflixSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-cinematic-whoosh-slide-2720.mp3");
window.addEventListener('load', () => {
  netflixSound.play().catch(()=>{console.log("Interagir pour le son");});
});
</script>
</body>
</html>

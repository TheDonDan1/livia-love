<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre Histoire ❤️</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
  text-align:center;
}

/* --- INTRO NETFLIX STYLE --- */
#netflixIntro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:4em;
  letter-spacing:0.2em;
  color:#E50914;
  font-weight:bold;
  opacity:0;
  z-index:100;
  transform: scale(0.5) rotateY(90deg);
  animation:netflixIn 2s forwards, netflixOut 1s forwards 3s;
}
@keyframes netflixIn{
  0% {opacity:0; transform: scale(0.5) rotateY(90deg);}
  50% {opacity:1; transform: scale(1.2) rotateY(0deg); text-shadow:0 0 20px #E50914;}
  70% {transform: scale(0.95); text-shadow:0 0 40px #E50914;}
  100% {opacity:1; transform: scale(1); text-shadow:0 0 60px #E50914;}
}
@keyframes netflixOut{
  to {opacity:0; visibility:hidden;}
}

/* Intro THE DON Production */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:3em;
  letter-spacing:5px;
  z-index:30;
  animation:fadeOut 4s forwards 4s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

h1{margin-top:20px;font-size:2em;position:relative;z-index:5;}
#counter{position:relative;z-index:5;}

.gallery {
  position: relative;
  width: 100%;
  height: 70vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 5;
}

.gallery img, .gallery video {
  position: absolute;
  max-width: 90%;
  max-height: 90%;
  border-radius: 20px;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 1s, transform 1s;
}

.gallery img.active, .gallery video.active {
  opacity:1;
  transform: scale(1.05);
  z-index:10;
}

#controls{
  position:relative;
  z-index:10;
  margin-top:10px;
}
button{
  padding:10px 20px;
  margin:0 10px;
  font-size:1em;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#fff;
  color:black;
}

#finalMessage{
  position:absolute;
  top:40%;
  width:100%;
  font-size:2em;
  opacity:0;
  transition:1s;
  z-index:10;
}

#playMusic{
  position:fixed;
  top:10px;
  right:10px;
  z-index:50;
  padding:10px 20px;
  font-size:1em;
  cursor:pointer;
}

#creditSlide {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:200;
  visibility:hidden;
}

#creditText {
  font-family: 'Segoe Script', 'Brush Script MT', 'Pacifico', cursive;
  font-size:2em;
  color:white;
  text-align:center;
  line-height:2em;
  max-width:80%;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<div id="netflixIntro">THE DON</div>
<div id="intro">THE DON PRODUCTION</div>
<canvas id="stars"></canvas>

<h1>Nos Souvenirs ❤️</h1>
<h2 id="counter"></h2>

<div class="gallery">
  <img src="assets/1768590874870.jpg">
  <img src="assets/20251231_135631.jpg">
  <img src="assets/IMG-20251227-WA0014.jpg">
  <img src="assets/IMG-20251227-WA0016.jpg">
  <img src="assets/IMG-20260101-WA0037.jpg">
  <img src="assets/IMG-20260116-WA0105.jpg">
  <img src="assets/IMG-20260116-WA0108.jpg">
  
  <video src="assets/Snapchat-1592542639-2.mp4" muted></video>
  <video src="assets/Snapchat-442811167.mp4" muted></video>
  <video src="assets/VID-20251231-WA0031.mp4" muted></video>
  <video src="assets/VID-20260101-WA0010.mp4" muted></video>
  <video src="assets/VID-20260101-WA0011.mp4" muted></video>
  <video src="assets/VID-20260101-WA0012.mp4" muted></video>
  <video src="assets/VID-20260101-WA0013.mp4" muted></video>
  <video src="assets/VID-20260110-WA0206.mp4" muted></video>
  <video src="assets/VID-20260116-WA0140.mp4" muted></video>
</div>

<div id="controls">
  <button id="prevBtn">⬅ Précédent</button>
  <button id="nextBtn">Suivant ➡</button>
</div>

<div id="finalMessage">💍 Pour toujours toi et moi ❤️</div>

<div id="creditSlide">
  <div id="creditText"></div>
</div>

<audio id="music" src="assets/tems-me-u.mp3" loop></audio>
<button id="playMusic">▶ Play Music</button>

<script>

/* ===== MUSIQUE ===== */
const music = document.getElementById("music");
document.getElementById("playMusic").onclick = () => {
  music.play();
  document.getElementById("playMusic").style.display="none";
};

/* ===== ETOILES ===== */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth; 
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    radius:Math.random()*2,
    speed:Math.random()*0.5
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.fill();
    s.y+=s.speed;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* ===== COMPTEUR ===== */
function updateCounter(){
  const startDate=new Date("2025-11-02T15:08:00");
  const now=new Date();
  const diff=now-startDate;
  const days=Math.floor(diff/(1000*60*60*24));
  const hours=Math.floor((diff/(1000*60*60))%24);
  const minutes=Math.floor((diff/(1000*60))%60);
  document.getElementById("counter").innerHTML=
    "Depuis "+days+" jours, "+hours+" heures et "+minutes+" minutes ❤️";
}
setInterval(updateCounter,60000);
updateCounter();

/* ===== GALERIE ===== */
const items=document.querySelectorAll(".gallery img, .gallery video");
let index=0;

function showItem(idx){
  items.forEach(item=>{
    item.classList.remove("active");
    if(item.tagName==="VIDEO"){ 
      item.pause(); 
      item.currentTime=0; 
    }
  });
  let current = items[idx];
  current.classList.add("active");
  if(current.tagName==="VIDEO") current.play();
}
showItem(index);

/* ===== NAVIGATION ===== */
document.getElementById("nextBtn").onclick = ()=>{
  if(index<items.length-1){ 
    index++; 
    showItem(index); 
  }
  if(index===items.length-1){
    document.getElementById("finalMessage").style.opacity="1";
    setTimeout(showCreditSlide,1500);
  }
};

document.getElementById("prevBtn").onclick = ()=>{
  if(index>0){ 
    index--; 
    showItem(index); 
  }
};

/* ===== CREDIT FINAL CORRIGE ===== */
function showCreditSlide(){
  const creditSlide = document.getElementById("creditSlide");
  const creditText = document.getElementById("creditText");
  creditSlide.style.visibility = "visible";
  creditText.innerHTML = "";

const lines = [
  "JE SAIS QUE JE NE SUIS PAS PARFAIT.",
  "MAIS JE SAIS CE QUE JE VEUX DEVENIR.",
  "ET JE SAIS AVEC QUI JE VEUX LE DEVENIR.",
  "AVEC TOI A MES COTES.",
  "POUR CONSTRUIRE, APPRENDRE ET GRANDIR CHAQUE JOUR.",
  "POUR TOUJOURS TOI ET MOI."
];
  let currentLine = 0;
  let currentChar = 0;

  function typeLine(){
    if(currentLine < lines.length){
      if(currentChar < lines[currentLine].length){
        creditText.innerHTML += lines[currentLine][currentChar];
        currentChar++;
        setTimeout(typeLine, 80);
      } else {
        creditText.innerHTML += "<br><br>";
        currentLine++;
        currentChar = 0;
        setTimeout(typeLine, 400);
      }
    }
  }

  typeLine();
}

</script>
</body>
</html>

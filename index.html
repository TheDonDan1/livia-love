<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre Histoire ❤️</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  text-align:center;
}

/* --- INTRO NETFLIX STYLE --- */
#netflixIntro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:8vw;
  letter-spacing:0.2em;
  color:#E50914;
  font-weight:bold;
  opacity:0;
  z-index:100;
  transform: scale(0.5) rotateY(90deg);
  animation:netflixIn 2s forwards, netflixOut 1s forwards 3s;
}
@keyframes netflixIn{
  0% {opacity:0; transform: scale(0.5) rotateY(90deg);}
  50% {opacity:1; transform: scale(1.2) rotateY(0deg); text-shadow:0 0 20px #E50914;}
  70% {transform: scale(0.95); text-shadow:0 0 40px #E50914;}
  100% {opacity:1; transform: scale(1); text-shadow:0 0 60px #E50914;}
}
@keyframes netflixOut{
  to {opacity:0; visibility:hidden;}
}

/* Canvas étoiles */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* Intro */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:6vw;
  letter-spacing:2vw;
  z-index:30;
  animation:fadeOut 4s forwards 4s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* Titres et compteur */
h1{margin-top:20px;font-size:5vw;position:relative;z-index:5;}
#counter{position:relative;z-index:5;font-size:4vw;}

/* Galerie avec swipe */
.gallery {
  position: relative;
  width: 100%;
  height: 50vh;
  display: flex;
  overflow: hidden;
  z-index:5;
  touch-action: pan-y;
}

.gallery img, .gallery video {
  min-width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
  flex-shrink: 0;
}

/* Message final */
#finalMessage{
  position:absolute;
  top:35%;
  width:100%;
  font-size:6vw;
  opacity:0;
  transition:1s;
  z-index:10;
}

/* Credits */
#credits{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:3s;
  font-size:4vw;
  z-index:20;
}

/* Bouton musique */
#playMusic{
  position:fixed;
  top:10px;
  right:10px;
  z-index:50;
  padding:10px 20px;
  font-size:4vw;
  cursor:pointer;
}

/* --- Responsive Mobile --- */
@media (max-width:768px){
  #netflixIntro{font-size:12vw;}
  #intro{font-size:10vw; letter-spacing:1vw;}
  h1{font-size:8vw;}
  #counter{font-size:6vw;}
  #finalMessage{font-size:8vw; top:30%;}
  #credits{font-size:5vw;}
  #playMusic{font-size:5vw; padding:12px 18px;}
}
</style>
</head>
<body>

<!-- NETFLIX STYLE INTRO -->
<div id="netflixIntro">THE DON</div>

<!-- Intro existant -->
<div id="intro">THE DON PRODUCTION</div>

<!-- Canvas étoiles -->
<canvas id="stars"></canvas>

<!-- Titres -->
<h1>Nos Souvenirs ❤️</h1>
<h2 id="counter"></h2>

<!-- Galerie swipe -->
<div class="gallery">
  <img src="assets/1768590874870.jpg">
  <img src="assets/20251231_135631.jpg">
  <img src="assets/IMG-20251227-WA0014.jpg">
  <img src="assets/IMG-20251227-WA0016.jpg">
  <img src="assets/IMG-20260101-WA0037.jpg">
  <img src="assets/IMG-20260116-WA0105.jpg">
  <img src="assets/IMG-20260116-WA0108.jpg">
  
  <video src="assets/Snapchat-1592542639-2.mp4" muted playsinline></video>
  <video src="assets/Snapchat-442811167.mp4" muted playsinline></video>
  <video src="assets/VID-20251231-WA0031.mp4" muted playsinline></video>
  <video src="assets/VID-20260101-WA0010.mp4" muted playsinline></video>
  <video src="assets/VID-20260101-WA0011.mp4" muted playsinline></video>
  <video src="assets/VID-20260101-WA0012.mp4" muted playsinline></video>
  <video src="assets/VID-20260101-WA0013.mp4" muted playsinline></video>
  <video src="assets/VID-20260110-WA0206.mp4" muted playsinline></video>
  <video src="assets/VID-20260116-WA0140.mp4" muted playsinline></video>
</div>

<!-- Message final -->
<div id="finalMessage">💍 Pour toujours toi et moi ❤️</div>

<!-- Credits -->
<div id="credits">
<h1 style="color:red;">FIN ❤️</h1>
<p>Une histoire écrite par THE DON</p>
<p>Avec Livia comme plus belle actrice</p>
<p>Depuis le 2 Novembre 2025</p>
</div>

<!-- Musique -->
<audio id="music" src="assets/tems-me-u.mp3" loop></audio>
<button id="playMusic">▶ Play Music</button>

<script>
// --- Musique ---
const music = document.getElementById("music");
document.getElementById("playMusic").onclick = () => {
  music.play();
  document.getElementById("playMusic").style.display="none";
};

// --- Étoiles ---
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let stars=[];
for(let i=0;i<200;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,radius:Math.random()*2,speed:Math.random()*0.5});
}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.fill();
    s.y+=s.speed;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// --- Compteur ---
function updateCounter(){
  const startDate=new Date("2025-11-02T15:08:00");
  const now=new Date();
  const diff=now-startDate;
  const days=Math.floor(diff/(1000*60*60*24));
  const hours=Math.floor((diff/(1000*60*60))%24);
  const minutes=Math.floor((diff/(1000*60))%60);
  document.getElementById("counter").innerHTML="Depuis "+days+" jours, "+hours+" heures et "+minutes+" minutes ❤️";
}
setInterval(updateCounter,60000);
updateCounter();

// --- Galerie swipe ---
const gallery = document.querySelector('.gallery');
const slides = Array.from(gallery.querySelectorAll('img, video'));
let currentIndex = 0;

function showSlide(index) {
  slides.forEach((slide,i)=>{
    slide.style.transform = `translateX(${100*(i-currentIndex)}%)`;
    if(slide.tagName==="VIDEO"){ slide.pause(); slide.currentTime=0; }
  });
  const current = slides[index];
  if(current.tagName==="VIDEO") current.play();

  // Message final et crédits
  if(currentIndex === slides.length-1){
    document.getElementById("finalMessage").style.opacity="1";
    setTimeout(()=>{document.getElementById("credits").style.bottom="0";},1500);
  } else {
    document.getElementById("finalMessage").style.opacity="0";
    document.getElementById("credits").style.bottom="-100%";
  }
}
showSlide(currentIndex);

// --- Swipe mobile et drag desktop ---
let startX = 0;
let isDragging = false;

gallery.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  isDragging = true;
});
gallery.addEventListener('touchend', e => {
  if(!isDragging) return;
  const dx = e.changedTouches[0].clientX - startX;
  if(dx < -50 && currentIndex < slides.length-1) currentIndex++;
  if(dx > 50 && currentIndex > 0) currentIndex--;
  showSlide(currentIndex);
  isDragging=false;
});

gallery.addEventListener('mousedown', e => { startX = e.clientX; isDragging = true; });
gallery.addEventListener('mouseup', e => {
  if(!isDragging) return;
  const dx = e.clientX - startX;
  if(dx < -50 && currentIndex < slides.length-1) currentIndex++;
  if(dx > 50 && currentIndex > 0) currentIndex--;
  showSlide(currentIndex);
  isDragging=false;
});
gallery.addEventListener('mouseleave', e => { isDragging=false; });

// --- Son Netflix intro ---
const netflixSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-cinematic-whoosh-slide-2720.mp3");
window.addEventListener('load', () => {
  netflixSound.play().catch(()=>{console.log("Interagir pour le son");});
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre Histoire ❤️</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
  text-align:center;
}
/* --- Netflix LD Intro/Outro --- */
#netflixOverlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:200;
}

#netflixLogo {
  color:red;
  font-family: 'Arial Black', sans-serif;
  font-size:8em;
  letter-spacing:0.5em;
  opacity:0;
  transform:scale(0.8);
}

/* Canvas étoiles */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* Titres et compteur */
h1{margin-top:20px;font-size:2em;position:relative;z-index:5;}
#counter{position:relative;z-index:5;}

/* Galerie diaporama */
.gallery {
  position: relative;
  width: 100%;
  height: 70vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 5;
}

.gallery img, .gallery video {
  position: absolute;
  max-width: 90%;
  max-height: 90%;
  border-radius: 20px;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 1s, transform 1s;
}

.gallery img.active, .gallery video.active {
  opacity:1;
  transform: scale(1.05);
  z-index:10;
}

/* Contrôles boutons */
#controls{
  position:relative;
  z-index:10;
  margin-top:10px;
}
button{
  padding:10px 20px;
  margin:0 10px;
  font-size:1em;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#fff;
  color:black;
}

/* Message final */
#finalMessage{
  position:absolute;
  top:40%;
  width:100%;
  font-size:2em;
  opacity:0;
  transition:1s;
  z-index:10;
}

/* Credits */
#credits{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:auto;
  font-size:1.2em;
  z-index:20;
  opacity:0;
  transition:2s;
}

/* Bouton musique */
#playMusic{
  position:fixed;
  top:10px;
  right:10px;
  z-index:50;
  padding:10px 20px;
  font-size:1em;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- Overlay Netflix LD -->
<div id="netflixOverlay">
  <div id="netflixLogo">LD</div>
</div>

<!-- Canvas étoiles -->
<canvas id="stars"></canvas>

<h1>Nos Souvenirs ❤️</h1>
<h2 id="counter"></h2>

<!-- Galerie -->
<div class="gallery">
  <img src="assets/1768590874870.jpg">
  <img src="assets/20251231_135631.jpg">
  <img src="assets/IMG-20251227-WA0014.jpg">
  <img src="assets/IMG-20251227-WA0016.jpg">
  <img src="assets/IMG-20260101-WA0037.jpg">
  <img src="assets/IMG-20260116-WA0105.jpg">
  <img src="assets/IMG-20260116-WA0108.jpg">
  
  <video src="assets/Snapchat-1592542639-2.mp4" muted></video>
  <video src="assets/Snapchat-442811167.mp4" muted></video>
  <video src="assets/VID-20251231-WA0031.mp4" muted></video>
  <video src="assets/VID-20260101-WA0010.mp4" muted></video>
  <video src="assets/VID-20260101-WA0011.mp4" muted></video>
  <video src="assets/VID-20260101-WA0012.mp4" muted></video>
  <video src="assets/VID-20260101-WA0013.mp4" muted></video>
  <video src="assets/VID-20260110-WA0206.mp4" muted></video>
  <video src="assets/VID-20260116-WA0140.mp4" muted></video>
</div>

<div id="controls">
  <button id="prevBtn">⬅ Précédent</button>
  <button id="nextBtn">Suivant ➡</button>
</div>

<div id="finalMessage">💍 Pour toujours toi et moi ❤️</div>

<div id="credits">
<h1 style="color:red;">FIN ❤️</h1>
<p>Une histoire écrite par THE DON</p>
<p>Avec Livia comme plus belle actrice</p>
<p>Depuis le 2 Novembre 2025</p>
<p>Merci à tous ceux qui ont suivi notre histoire ❤️</p>
<p>La musique par TEMS - Me & U</p>
<p>Et bien plus...</p>
</div>

<audio id="music" src="assets/tems-me-u.mp3" loop></audio>
<button id="playMusic">▶ Play Music</button>

<script>
// ----------------- MUSIQUE -----------------
const music = document.getElementById("music");
const musicButton = document.getElementById("playMusic");
musicButton.onclick = ()=>{
  music.play();
  musicButton.style.display="none";
};

// ----------------- ÉTOILES -----------------
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let stars=[];
for(let i=0;i<200;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,radius:Math.random()*2,speed:Math.random()*0.5});
}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.fill();
    s.y+=s.speed;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ----------------- COMPTEUR -----------------
function updateCounter(){
  const startDate=new Date("2025-11-02T15:08:00");
  const now=new Date();
  const diff=now-startDate;
  const days=Math.floor(diff/(1000*60*60*24));
  const hours=Math.floor((diff/(1000*60*60))%24);
  const minutes=Math.floor((diff/(1000*60))%60);
  document.getElementById("counter").innerHTML="Depuis "+days+" jours, "+hours+" heures et "+minutes+" minutes ❤️";
}
setInterval(updateCounter,60000);
updateCounter();

// ----------------- DIAPORAMA -----------------
const items=document.querySelectorAll(".gallery img, .gallery video");
let index=0;
function showItem(idx){
  items.forEach(item=>{
    item.classList.remove("active");
    if(item.tagName==="VIDEO"){ item.pause(); item.currentTime=0; }
  });
  let current = items[idx];
  current.classList.add("active");
  if(current.tagName==="VIDEO") current.play();
}

// ----------------- NAVIGATION -----------------
document.getElementById("nextBtn").onclick = ()=>{
  if(index<items.length-1){ index++; showItem(index); }
  if(index===items.length-1){
    // Affiche message final
    document.getElementById("finalMessage").style.opacity="1";
    // Après 2s, lance fermeture Netflix
    setTimeout(()=>{ playNetflixOutro(); },2000);
  }
};
document.getElementById("prevBtn").onclick = ()=>{
  if(index>0){ index--; showItem(index); }
};

// ----------------- INTRO NETFLIX LD -----------------
function playNetflixIntro(callback){
  const overlay = document.getElementById("netflixOverlay");
  const logo = document.getElementById("netflixLogo");
  logo.style.opacity="0";
  logo.style.transform="scale(0.5)";
  overlay.style.display="flex";

  setTimeout(()=>{ logo.style.transition="0.7s"; logo.style.opacity="1"; logo.style.transform="scale(1.2)"; },100);
  setTimeout(()=>{ logo.style.transform="scale(1)"; },700);

  setTimeout(()=>{
    logo.style.transition="1s";
    logo.style.opacity="0";
  },1500);

  setTimeout(()=>{
    overlay.style.display="none";
    if(callback) callback();
  },2500);
}

// ----------------- OUTRO NETFLIX LD -----------------
function playNetflixOutro(){
  const overlay = document.getElementById("netflixOverlay");
  const logo = document.getElementById("netflixLogo");
  overlay.style.display="flex";
  logo.style.opacity="0";
  logo.style.transform="scale(0.5)";

  setTimeout(()=>{ logo.style.transition="0.7s"; logo.style.opacity="1"; logo.style.transform="scale(1.2)"; },100);
  setTimeout(()=>{ logo.style.transform="scale(1)"; },700);

  setTimeout(()=>{
    logo.style.transition="1s";
    logo.style.opacity="0";
    // Affiche crédits
    document.getElementById("credits").style.opacity="1";
  },1500);
}

// ----------------- DEMARRAGE -----------------
playNetflixIntro(()=>{
  showItem(0);
  if(!music.paused){ music.play(); }
});
</script>
</body>
</html>
